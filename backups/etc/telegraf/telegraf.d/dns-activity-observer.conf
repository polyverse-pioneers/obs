[[inputs.exec]]
  # Summarize recent Unbound query/reply logs into bounded top-N Prometheus
  # metrics instead of storing raw DNS events in Prometheus.
  environment = [
    "DNS_ACTIVITY_WINDOW=15m",
    "DNS_ACTIVITY_TOP_N=20",
    "DNS_ACTIVITY_IGNORE_NAMES=heisenberg,hawking,bohr,cloudflare.com,google.com,github.com,example.com,speedtest.nyc1.us.leaseweb.net",
    "DNS_ACTIVITY_IGNORE_SUFFIXES=home.spinriko.com,home.polyversepioneers.org,home.polyversepioneers.com,spinrikolab.home.arpa",
    "DNS_ACTIVITY_UPSTREAM_LABELS=1.1.1.1=cloudflare-primary,1.0.0.1=cloudflare-secondary"
  ]
  commands = ["/usr/bin/python3 /opt/obs/dns_activity_observer.py"]
  timeout = "30s"
  data_format = "prometheus"
  interval = "1m"