# ============================
#   MIKROTIK — SCRAPE ALL
# ============================

[[inputs.snmp]]
  agents = [ "udp://heisenberg:161" ]
  version = 2
  community = "public"
  timeout = "5s"
  retries = 3
  name = "mikrotik"

  # ----------------------------
  # SYSTEM
  # ----------------------------
  [[inputs.snmp.field]]
    name = "sysName"
    oid  = "1.3.6.1.2.1.1.5.0"

  [[inputs.snmp.field]]
    name = "sysUpTime"
    oid  = "1.3.6.1.2.1.1.3.0"

  [[inputs.snmp.field]]
    name = "sysDescr"
    oid  = "1.3.6.1.2.1.1.1.0"

  # ----------------------------
  # CPU / MEMORY
  # ----------------------------
  [[inputs.snmp.field]]
    name = "cpuLoad"
    oid  = "1.3.6.1.4.1.14988.1.1.3.10.0"

  [[inputs.snmp.field]]
    name = "memTotal"
    oid  = "1.3.6.1.4.1.14988.1.1.3.8.0"

  [[inputs.snmp.field]]
    name = "memFree"
    oid  = "1.3.6.1.4.1.14988.1.1.3.9.0"

  # ----------------------------
  # TEMPERATURE / VOLTAGE
  # ----------------------------
  [[inputs.snmp.field]]
    name = "temperature"
    oid  = "1.3.6.1.4.1.14988.1.1.3.7.0"

  [[inputs.snmp.field]]
    name = "voltage"
    oid  = "1.3.6.1.4.1.14988.1.1.3.6.0"

  # ----------------------------
  # INTERFACES (full table)
  # ----------------------------
  [[inputs.snmp.table]]
    name = "interfaces"
    oid  = "1.3.6.1.2.1.2.2"

    [[inputs.snmp.table.field]]
      name = "ifDescr"
      oid  = "1.3.6.1.2.1.2.2.1.2"

    [[inputs.snmp.table.field]]
      name = "ifType"
      oid  = "1.3.6.1.2.1.2.2.1.3"

    [[inputs.snmp.table.field]]
      name = "ifMtu"
      oid  = "1.3.6.1.2.1.2.2.1.4"

    [[inputs.snmp.table.field]]
      name = "ifSpeed"
      oid  = "1.3.6.1.2.1.2.2.1.5"

    [[inputs.snmp.table.field]]
      name = "ifPhysAddress"
      oid  = "1.3.6.1.2.1.2.2.1.6"

    [[inputs.snmp.table.field]]
      name = "ifAdminStatus"
      oid  = "1.3.6.1.2.1.2.2.1.7"

    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid  = "1.3.6.1.2.1.2.2.1.8"

    [[inputs.snmp.table.field]]
      name = "ifInOctets"
      oid  = "1.3.6.1.2.1.2.2.1.10"

    [[inputs.snmp.table.field]]
      name = "ifOutOctets"
      oid  = "1.3.6.1.2.1.2.2.1.16"

    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid  = "1.3.6.1.2.1.2.2.1.14"

    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid  = "1.3.6.1.2.1.2.2.1.20"

  # ----------------------------
  # BRIDGE PORTS
  # ----------------------------
  [[inputs.snmp.table]]
    name = "bridgePorts"
    oid  = "1.3.6.1.2.1.17.4.3"

