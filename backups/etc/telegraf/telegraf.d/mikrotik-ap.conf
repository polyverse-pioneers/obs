# ============================================
#   MIKROTIK AP — FULL WIRELESS SCRAPE
# ============================================

[[inputs.snmp]]
  agents = [ "udp://hawking:161" ]
  version = 2
  community = "public"
  timeout = "5s"
  retries = 3
  name = "mikrotik_ap"

  # ----------------------------
  # SYSTEM
  # ----------------------------
  [[inputs.snmp.field]]
    name = "sysName"
    oid  = "1.3.6.1.2.1.1.5.0"

  [[inputs.snmp.field]]
    name = "sysUpTime"
    oid  = "1.3.6.1.2.1.1.3.0"

  [[inputs.snmp.field]]
    name = "sysDescr"
    oid  = "1.3.6.1.2.1.1.1.0"

  # ----------------------------
  # CPU / MEMORY
  # ----------------------------
  [[inputs.snmp.field]]
    name = "cpuLoad"
    oid  = "1.3.6.1.4.1.14988.1.1.3.10.0"

  [[inputs.snmp.field]]
    name = "memTotal"
    oid  = "1.3.6.1.4.1.14988.1.1.3.8.0"

  [[inputs.snmp.field]]
    name = "memFree"
    oid  = "1.3.6.1.4.1.14988.1.1.3.9.0"

  # ----------------------------
  # TEMPERATURE / VOLTAGE
  # ----------------------------
  [[inputs.snmp.field]]
    name = "temperature"
    oid  = "1.3.6.1.4.1.14988.1.1.3.7.0"

  [[inputs.snmp.field]]
    name = "voltage"
    oid  = "1.3.6.1.4.1.14988.1.1.3.6.0"

  # ----------------------------
  # INTERFACES (full table)
  # ----------------------------
  [[inputs.snmp.table]]
    name = "interfaces"
    oid  = "1.3.6.1.2.1.2.2"

  # ----------------------------
  # BRIDGE PORTS
  # ----------------------------
  [[inputs.snmp.table]]
    name = "bridgePorts"
    oid  = "1.3.6.1.2.1.17.4.3"

  # mikrotik does NOT support this
  # ----------------------------
  # VLAN TABLE
  # ----------------------------
  #[[inputs.snmp.table]]
  #  name = "vlans"
  #  oid  = "1.3.6.1.2.1.17.7.1.4.3.1"

  # ----------------------------
  # WIRELESS — REGISTRATION TABLE
  # (signal, CCQ, rate, MCS, tx/rx)
  # ----------------------------
  #[[inputs.snmp.table]]
  #  name = "wireless_registration"
  #  oid  = "1.3.6.1.4.1.14988.1.1.1.2"

  # ----------------------------
  # WIRELESS — INTERFACE TABLE
  # (SSID, freq, band, channel width)
  # ----------------------------
  #[[inputs.snmp.table]]
  #  name = "wireless_interfaces"
  #  oid  = "1.3.6.1.4.1.14988.1.1.1.1"

  # ----------------------------
  # WIRELESS — ACCESS POINT TABLE
  # (AP mode, beaconing, capabilities)
  # ----------------------------
  #[[inputs.snmp.table]]
  #  name = "wireless_ap"
  #  oid  = "1.3.6.1.4.1.14988.1.1.1.3"

  # ----------------------------
  # DHCP LEASES (if AP runs DHCP)
  # ----------------------------
  [[inputs.snmp.table]]
    name = "dhcpLeases"
    oid  = "1.3.6.1.2.1.67.1.2.1"

  # ----------------------------
  # SFP DIAGNOSTICS (if present)
  # ----------------------------
  #[[inputs.snmp.table]]
  #  name = "sfp"
  #  oid  = "1.3.6.1.4.1.14988.1.1.14.1"

