[[inputs.unbound]]
  # Preferred setup: add the telegraf service account to the unbound group so
  # unbound-control can read its cert/key material without sudo.
  config_file = "/etc/unbound/unbound.conf"
  interval = "30s"
  thread_as_tag = true
  histogram = true

  [inputs.unbound.tags]
    service = "unbound"
    resolver = "planck-local"

[[inputs.dns_query]]
  # Synthetic resolver health check against the local DNS listener.
  servers = ["127.0.0.1"]
  domains = ["cloudflare.com"]
  record_type = "A"
  port = 53
  timeout = "2s"
  interval = "30s"

  [inputs.dns_query.tags]
    service = "unbound"
    resolver = "planck-local"
    probe = "recursive-a"

[[inputs.dns_query]]
  servers = ["127.0.0.1"]
  domains = ["google.com"]
  record_type = "AAAA"
  port = 53
  timeout = "2s"
  interval = "30s"

  [inputs.dns_query.tags]
    service = "unbound"
    resolver = "planck-local"
    probe = "recursive-aaaa"