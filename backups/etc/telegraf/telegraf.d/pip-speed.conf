[[inputs.exec]]
  # Wrapper emits Prometheus text metrics from scheduled iperf3 tests.
  # Tested from planck on 2026-05-06:
  # - West: speedtest.sfo12.us.leaseweb.net:5201
  # - East: speedtest.nyc1.us.leaseweb.net:5201
  # - Pacific fallback (no Hawaii public iperf3 entry currently listed): akl.linetest.nz:5300
  environment = [
    "IPERF3_ENDPOINTS=speedtest.sfo12.us.leaseweb.net:5201,speedtest.nyc1.us.leaseweb.net:5201,akl.linetest.nz:5300",
    "IPERF3_ENABLE_UPLOAD=1",
    "IPERF3_DURATION_SECONDS=30",
    "IPERF3_PARALLEL_STREAMS=4"
  ]
  commands = ["/opt/pip-speed/pip-speed-wrapper.sh"]
  timeout = "120s"
  data_format = "prometheus"
  interval = "15m"
